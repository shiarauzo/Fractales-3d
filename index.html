<!DOCTYPE html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Fractales 3D</title>
    <link rel="stylesheet" href="./src/styles.css" />
  </head>
  <body>
    <canvas id="gl" tabindex="0"></canvas>

    <div id="hud" class="mode-full">
      <div class="row primary">
        <label for="fractalIdx">Fractal #</label>
        <input id="fractalIdx" type="number" min="1" max="10" value="1" />
        <span id="fractalName">—</span>
        <span class="badge" id="speedMultiplier">× 1.00</span>
        <span class="badge" id="qualityLevel">Q2</span>
      </div>
      <div class="hint">
        <kbd>Click</kbd> capturar ·
        <kbd>Mouse</kbd> orbitar ·
        <kbd>W</kbd>/<kbd>S</kbd> acercar/alejar ·
        <kbd>A</kbd>/<kbd>D</kbd> pan horizontal ·
        <kbd>Z</kbd>/<kbd>X</kbd> o <kbd>Ctrl</kbd>+<kbd>Scroll</kbd> zoom ·
        <kbd>+</kbd>/<kbd>-</kbd> fractal ·
        <kbd>R</kbd> reset ·
        <kbd>H</kbd> HUD
      </div>
    </div>

    <div id="lockOverlay" class="overlay hidden">
      <div>Click para entrar · Esc para salir</div>
    </div>

    <div id="formula-panel">
      <span id="formulaText">z = z^8 + c</span>
    </div>

    <div id="zoom-controls">
      <button id="zoomIn" title="Zoom In">+</button>
      <span id="fovValue">60°</span>
      <button id="zoomOut" title="Zoom Out">−</button>
    </div>

    <script type="module" src="./src/main.js"></script>
  </body>
</html>
